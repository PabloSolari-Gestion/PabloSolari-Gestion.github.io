<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia y Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f1f5f9; /* Gris suave (Slate 100) */
            --card: #ffffff; /* Tarjetas blancas para contraste */
            --text-main: #1e293b; /* Texto casi negro */
            --text-muted: #64748b; /* Texto secundario gris */
            --accent: #10b981; /* El verde esmeralda que te gustó */
            --border: #cbd5e1; /* Bordes sutiles */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 65px 15px 15px;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 10px 5%;
            display: flex;
            justify-content: flex-end;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .btn-nav {
            padding: 8px 20px;
            background: var(--accent);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-nav:hover { background: #059669; transform: translateY(-1px); }

        /* GRID */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 1250px;
            margin: 0 auto;
        }

        .bento-item {
            background-color: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        /* HERO */
        .item-hero { grid-column: 1 / 4; }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.6rem, 3.8vw, 2.8rem);
            line-height: 1.0;
            margin-bottom: 10px;
            letter-spacing: -1.5px;
            color: var(--text-main);
        }
        .proposal-text { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; max-width: 600px; margin-bottom: 20px; }
        
        .grid-pilares { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 20px;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
        }
        .pilar h3 { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 700; }
        .pilar p { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }

        .badges-container { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .badges-container img { height: 18px; border-radius: 3px; }

        /* SIDEBAR */
        .item-sidebar { grid-column: 4 / 5; display: flex; flex-direction: column; gap: 10px; }
        .video-box-small { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16/9; background: #f8fafc; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .linkedin-link-new {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .linkedin-link-new:hover { border-color: var(--accent); color: var(--accent); }

        /* DASHBOARDS */
        .item-dashboards { grid-column: 1 / 3; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .window { background: #f8fafc; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; height: 140px; }
        .window-header { background: #f1f5f9; padding: 6px; display: flex; gap: 5px; align-items: center; border-bottom: 1px solid var(--border); }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .window-content img { width: 100%; display: block; filter: blur(3px); transition: 0.4s; }
        .window:hover .window-content img { filter: blur(0); }

        /* FOOTER INFO */
        .item-footer-info {
            grid-column: 3 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .count { font-size: 1.8rem; font-weight: 900; line-height: 1; color: var(--accent); }
        .label { font-size: 0.6rem; color: var(--text-main); text-transform: uppercase; margin-top: 5px; font-weight: 700; }

        .tag { font-size: 0.6rem; background: #f1f5f9; padding: 4px 10px; border-radius: 6px; display: inline-block; border: 1px solid var(--border); color: var(--text-muted); }

        @media (max-width: 1000px) {
            .bento-grid { grid-template-columns: 1fr; }
            .item-hero, .item-sidebar, .item-dashboards, .item-footer-info { grid-column: 1 / -1; }
        }
    </style>
</head>
