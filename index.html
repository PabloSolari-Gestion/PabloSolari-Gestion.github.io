<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Gestión de Negocios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0a0a0a; /* Negro profundo */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            text-transform: none; /* Estilo moderno */
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: #888; /* Gris suave para el subtítulo */
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .divider {
            width: 50px;
            height: 2px;
            background-color: #333;
            margin: 20px auto;
        }

        .contact-links {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: 1px solid #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pablo Solari</h1>
        <div class="divider"></div>
        <p class="subtitle">Contador Público<br>Estratega en Gestión de Negocios</p>
        
        <div class="contact-links">
            <a href="https://wa.me/tu-numero-aqui" class="btn" target="_blank">Contactar</a>
        </div>
    </div>

</body>
</html>
