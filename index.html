<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia y Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #e2e8f0; /* Un gris que se nota pero no cansa */
            --card: #ffffff; 
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --accent: #10b981; /* Tu verde esmeralda */
            --border: #94a3b8; /* Bordes marcados para que no se vea vacío */
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 70px 15px 20px;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 12px 5%;
            display: flex;
            justify-content: flex-end;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--border);
        }

        .btn-nav {
            padding: 8px 22px;
            background: var(--accent);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1px;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
        }

        /* GRID */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1250px;
            margin: 0 auto;
        }

        .bento-item {
            background-color: var(--card);
            border-radius: 18px;
            border: 1px solid var(--border);
            padding: 22px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        /* HERO */
        .item-hero { grid-column: 1 / 4; }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            line-height: 1.1;
            margin-bottom: 12px;
            letter-spacing: -1.5px;
        }
        .proposal-text { font-size: 1rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
        
        .grid-pilares { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 20px;
            border-top: 2px solid #f1f5f9;
            padding-top: 15px;
        }
        .pilar h3 { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
        .pilar p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

        /* SIDEBAR (VIDEO Y LINKEDIN) */
        .item-sidebar { grid-column: 4 / 5; display: flex; flex-direction: column; gap: 15px; }
        .video-box { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .linkedin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.8rem;
            font-weight: 700;
            transition: 0.3s;
        }
        .linkedin-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* DASHBOARDS */
        .item-dashboards { grid-column: 1 / 3; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .window { background: #f8fafc; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; height: 150px; }
        .window-header { background: #e2e8f0; padding: 8px; display: flex; gap: 5px; align-items: center; border-bottom: 1px solid var(--border); }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
