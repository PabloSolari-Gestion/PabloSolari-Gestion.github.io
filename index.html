<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia y Control de Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-body: #0a0a0a; 
            --bg-card: #141414; 
            --accent: #007bff; 
            --border: #2a2a2a; 
            --text-main: #f0f0f0;
            --text-muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.4;
            padding: 40px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .bento-item {
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 40px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .bento-item:hover {
            border-color: #444;
        }

        /* Bloque Principal: Identidad y Propuesta */
        .item-hero {
            grid-column: 1 / 3;
            justify-content: center;
        }

        .tagline {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -4px;
            margin-bottom: 30px;
        }

        .proposal-text {
            font-size: 1.25rem;
            font-weight: 300;
            color: #ccc;
            line-height: 1.6;
            max-width: 600px;
        }

        .proposal-text strong {
            color: #fff;
            font-weight: 500;
        }

        /* Bloque Video */
        .item-video {
            grid-column: 3 / 4;
            padding: 20px;
            justify-content: center;
        }

        .video-wrapper {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            background: #000;
        }

        video { width: 100%; display: block; }

        /* Bloque Power BI Showcase */
        .item-bi {
            grid-column: 1 / 4;
            padding: 30px;
            text-align: center;
        }

        .bi-img {
            width: 100%;
            max-width: 1000px;
            border-radius: 8px;
            margin: 0 auto 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Bloque Servicios */
        .services-container {
            grid-column: 1 / 4;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .service-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .service-card h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .service-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Botón de Acción */
        .cta-container {
            grid-column: 1 / 4;
            text-align: center;
            padding: 40px 0;
        }

        .btn {
            display: inline-block;
            padding: 20px 50px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-3px);
        }

        @media (max-width: 900px) {
            body { padding: 20px; }
            .bento-grid { grid-template-columns: 1fr; }
            .item-hero, .item-video, .item-bi, .services-container { grid-column: 1 / 2; }
            .services-container { grid-template-columns: 1fr; }
            h1 { font-size: 4rem; }
        }
    </style>
